<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vetra UI</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>

    <nav>
        <div class="logo">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 22h20L12 2z"/></svg>
            Vetra
        </div>
        <div class="nav-links">
            <a href="#">Use cases ▾</a>
            <a href="#">Features ▾</a>
            <a href="#">Pricing</a>
            <a href="#">Contact</a>
        </div>
        <button class="btn btn-primary">Get started</button>
    </nav>

    <div class="hero">
        <div class="badge animate-up">
            New version is out! Read more <span>→</span>
        </div>
        <h1 class="animate-up delay-1">Accelerate Your Sales With AI</h1>
        <p class="animate-up delay-2">AI-driven sales automation & insights. Empower your team, close more deals, and maximize revenue effortlessly.</p>
        <div class="hero-actions animate-up delay-3">
            <button class="btn btn-outline">
                ▶ Watch Demo
            </button>
            <button class="btn btn-primary">Get started for free</button>
        </div>
    </div>

    <div class="planet-arc-container"></div>

    <div class="bottom-content">
        <div class="trusted-by animate-up delay-1">
            <p>Trusted by 200+ companies</p>
            <div class="logos">
                <span>✦ FeatherDev</span>
                <span>✧ SoftsNPT</span>
                <span>⊛ GlobalBank</span>
                <span>⎔ Lightning</span>
            </div>
        </div>

        <div class="dashboard-mock animate-up delay-2">
            <div style="width: 200px; display: flex; flex-direction: column; gap: 15px;">
                <div style="height: 20px; width: 60%; background: #222; border-radius: 4px;"></div>
                <div style="height: 15px; width: 80%; background: #1a1a1a; border-radius: 4px; margin-top: 20px;"></div>
                <div style="height: 15px; width: 70%; background: #1a1a1a; border-radius: 4px;"></div>
                <div style="height: 15px; width: 90%; background: #1a1a1a; border-radius: 4px;"></div>
            </div>
            <div style="flex: 1; display: flex; flex-direction: column; gap: 20px;">
                <div style="height: 40px; width: 100%; background: #111; border-radius: 8px;"></div>
                <div style="display: flex; gap: 20px; height: 100%;">
                    <div style="flex: 2; background: #111; border-radius: 8px; padding: 15px;">
                        <div style="height: 15px; width: 30%; background: #222; border-radius: 4px; margin-bottom: 20px;"></div>
                        <div style="height: 1px; width: 100%; background: #222; margin-bottom: 15px;"></div>
                        <div style="height: 1px; width: 100%; background: #222; margin-bottom: 15px;"></div>
                    </div>
                    <div style="flex: 1; background: #111; border-radius: 8px; padding: 15px;">
                        <div style="height: 15px; width: 50%; background: #222; border-radius: 4px;"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
